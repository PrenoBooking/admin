<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>PrenoBooking | Panel Administrador</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Panel administrador – PrenoBooking." />

  <!-- Favicon -->
  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/vicentemoyanoas-boop/booking-preno-assets/main/favicon.png"
    sizes="64x64">
  <link rel="apple-touch-icon"
    href="https://raw.githubusercontent.com/vicentemoyanoas-boop/booking-preno-assets/main/favicon.png">

  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap">

  <script>
    const BASE_APP_URL = "https://script.google.com/macros/s/AKfycbyp-OnqB-PbDHUm3BFh0kzO8wcN6vhvcAfNRmUaJa5Fb-mYHR6t4c1rA061mxlM8GfN/exec";

    function buildFrameUrl() {
      const propios = new URLSearchParams(window.location.search);
      if (!propios.has('view')) propios.set('view', 'login');
      return `${BASE_APP_URL}?${propios.toString()}`;
    }

    const frameUrl = buildFrameUrl();
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

    if (isMobile) {
      // 🚀 REDIRECCIÓN INSTANTÁNEA EN MÓVILES: Saltarse el iframe problemático de iOS
      window.location.replace(frameUrl);
    }
  </script>

  <style>
    :root{
      --header-h: 64px;
      --header-bg: #F0F7F6;
      --header-border: rgba(0,0,0,.08);
      --page-bg: #F0F7F6;
      --brand: #0D9488;
      --accent: #B4F461;
      --text-main: #0F172A;
    }

    html, body{
      height: 100%;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--page-bg);
      overflow: hidden;
    }

    .wrap{
      height: 100dvh;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }

    header{
      height: var(--header-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 10;
    }

    .admin-badge{
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      letter-spacing: .3px;
    }

    .frame-area{
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--page-bg);
    }

    iframe#admin-frame{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
      z-index: 1;
    }

    .loader{
      position:absolute;
      inset: 0;
      display:grid;
      place-items:center;
      background: #F0F7F6;
      transition: opacity .2s ease;
      z-index: 5;
    }

    .loader.hidden{ 
      opacity: 0; 
      pointer-events:none; 
    }

    .spinner-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .spinner{
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(13,148,136,.15);
      border-top-color: var(--brand);
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--brand);
    }

    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .fallback{
      position:absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display:none;
      gap: 14px;
      align-items:center;
      padding: 14px 20px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,.08);
      font-size: 14px;
      color: rgba(15, 23, 42, 0.7);
      box-shadow: 0 20px 40px rgba(0,0,0,.06);
      z-index: 10;
    }

    .fallback.show{
      display:flex;
    }

    .btn{
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration:none;
      font-weight: 600;
      font-size: 14px;
      color: white;
      background: var(--brand);
      transition: opacity .2s ease;
    }

    @media (max-width: 520px){
      :root{ --header-h: 60px; }
      header{
        justify-content: center;
      }
      .admin-badge{
        display:none;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="30" height="30" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="4" y="4" width="56" height="56" rx="18" fill="#0D9488"/>
          <rect x="18" y="20" width="28" height="26" rx="6" fill="#ffffff"/>
          <rect x="22.5" y="24.5" width="19" height="17" rx="3" fill="#0D9488"/>
          <rect x="23" y="13" width="5" height="12" rx="2.5" fill="#ffffff"/>
          <rect x="36" y="13" width="5" height="12" rx="2.5" fill="#ffffff"/>
          <circle cx="32" cy="34" r="4.5" fill="#B4F461"/>
        </svg>
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#0F172A;">preno<span style="font-weight:500;color:#0D9488;">booking</span></span>
      </div>

      <div class="admin-badge">
        Panel Administrador
      </div>
    </header>

    <div class="frame-area">
      <div id="loader" class="loader">
        <div class="spinner-box">
          <div class="spinner"></div>
          <div class="loading-text" id="loader-msg">Abriendo panel de seguridad...</div>
        </div>
      </div>

      <iframe
        id="admin-frame"
        title="Panel Administrador"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>

      <div id="fb" class="fallback">
        <span>¿No carga?</span>
        <a id="fb-link" class="btn" href="#" target="_top">Abrir directamente</a>
      </div>
    </div>
  </div>

  <script>
    const loader = document.getElementById('loader');
    const fb     = document.getElementById('fb');
    const frame  = document.getElementById('admin-frame');
    const fbLink = document.getElementById('fb-link');

    if (!isMobile && frame) {
      frame.src = frameUrl;
      fbLink.href = frameUrl;

      let appLoadedSuccessfully = false;

      window.addEventListener("message", function(event) {
        if (event.data === "app_loaded") {
          appLoadedSuccessfully = true;
          loader.classList.add('hidden');
        }
      });

      setTimeout(() => {
        if (!appLoadedSuccessfully) {
          fb.classList.add('show');
          loader.classList.add('hidden');
        }
      }, 5000);
    }
  </script>
</body>
</html>
